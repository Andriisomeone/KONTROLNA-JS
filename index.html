<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        .users {
            display: flex;
            flex-wrap: wrap;
        }
        .user {
            width: 45%;
            margin: 10px;
            padding: 15px;
            background: #f2f2f2;
            border-radius: 10px;
        }
        a {
            display: block;
            margin-top: 10px;
            text-align: center;
            background: #007bff;
            color: white;
            padding: 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="users" id="users">
    <!-- щоб не було warning -->
    <div class="user" style="display:none;"></div>
</div>

<script>
    fetch('https://jsonplaceholder.typicode.com/users')
        .then(res => res.json())
        .then(users => {
            const container = document.getElementById('users');

            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user';

                div.innerHTML = `
                <p><b>ID:</b> ${user.id}</p>
                <p><b>Name:</b> ${user.name}</p>
                <a href="user-details.html?id=${user.id}">
                    Details
                </a>
            `;

                container.appendChild(div);
            });
        });
</script>

</body>
</html>
